<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%233b82f6'/%3E%3Ctext x='32' y='44' text-anchor='middle' font-family='Arial' font-weight='bold' font-size='32' fill='%23ffffff'%3ES%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
/* ============================================================
   SKAVYOY · orbital minimal
   Fusion : "radial orbital timeline" + "shader lines" (Three.js)
   Un seul accent sombre, pseudonyme au centre, liens en orbite.
   ============================================================ */
:root{
  --bg: #000000;
  --text: #ffffff;
  --accent: #3b82f6;            /* bleu électrique — change cette seule valeur (+ --on-accent) */
  --accent-soft: rgba(59,130,246,.20);
  --accent-line: rgba(59,130,246,.42);
  --on-accent: #ffffff;         /* texte/icône posé SUR l'accent */
  --node: 64px;
  --node-mobile: 58px;
  --font: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
}

*{ box-sizing: border-box; margin: 0; padding: 0; }
html, body{ height: 100%; }
body{
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}
::selection{ background: var(--accent); color: var(--on-accent); }
:focus-visible{ outline: 2px solid var(--accent); outline-offset: 4px; border-radius: 6px; }

.sr-only{
  position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
}

/* ---------- Fond : shader Three.js ---------- */
#shader{ position: fixed; inset: 0; z-index: 0; display: block; }

/* vignette pour assombrir les bords et concentrer le regard */
.vignette{
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background:
    radial-gradient(circle at 50% 50%, rgba(0,0,0,.72) 0%, rgba(0,0,0,.35) 26%, transparent 46%, rgba(0,0,0,.6) 78%, #000 100%);
}

/* ---------- Scène orbitale ---------- */
.stage{
  position: fixed; inset: 0; z-index: 2;
  display: grid; place-items: center;
}
.orbit{
  position: relative;
  width: 1px; height: 1px;            /* point d'ancrage central */
}
.track{ display: contents; }          /* desktop : n'altère pas le positionnement de l'orbite */
.dots{ display: none; }               /* indicateur de slider : mobile uniquement */

/* anneau guide */
.ring{
  position: absolute; top: 50%; left: 50%;
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 50%;
  transform: translate(-50%,-50%);
  pointer-events: none;
}

/* ---------- Noyau central : le pseudo ---------- */
.core{
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  display: grid; place-items: center;
  background: none; border: 0; cursor: pointer;
  padding: 18px 22px;
  z-index: 5;
}
.core-name{
  position: relative; z-index: 2;
  font-weight: 200;
  font-size: clamp(28px, 7vw, 54px);
  letter-spacing: .14em;
  padding-left: .14em;               /* compense le tracking à droite */
  color: var(--text);
  text-shadow: 0 0 24px var(--accent-soft), 0 0 60px var(--accent-soft);
  transition: text-shadow .4s ease, letter-spacing .4s ease;
  white-space: nowrap;
}
.core:hover .core-name{
  text-shadow: 0 0 28px var(--accent), 0 0 70px var(--accent-soft);
  letter-spacing: .2em;
}
/* pings concentriques */
.core .ping{
  position: absolute; top: 50%; left: 50%;
  width: 120px; height: 120px;
  margin: -60px 0 0 -60px;
  border: 1px solid var(--accent-line);
  border-radius: 50%;
  opacity: 0;
  pointer-events: none;
  animation: ping 3.4s cubic-bezier(0,0,.2,1) infinite;
}
.core .ping:nth-child(2){ animation-delay: 1.7s; }
@keyframes ping{
  0%   { transform: scale(.55); opacity: .55; }
  70%  { opacity: 0; }
  100% { transform: scale(2.4); opacity: 0; }
}

/* ---------- Nœuds en orbite ---------- */
.node{
  position: absolute; top: 50%; left: 50%;
  width: var(--node); height: var(--node);
  margin: calc(var(--node) / -2) 0 0 calc(var(--node) / -2);
  display: grid; place-items: center;
  border-radius: 50%;
  color: var(--text);
  text-decoration: none;
  background: rgba(0,0,0,.55);
  border: 1px solid rgba(255,255,255,.22);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  will-change: transform;
  transition: background .3s ease, border-color .3s ease, box-shadow .3s ease, color .3s ease;
  touch-action: manipulation;
}
.node svg{ width: 25px; height: 25px; display: block; }
.node .fill{ fill: currentColor; }
.node .line{ fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.node:hover, .node:focus-visible{
  background: var(--accent);
  border-color: var(--accent);
  color: var(--on-accent);
  box-shadow: 0 0 24px var(--accent-soft), 0 0 48px var(--accent-soft);
}
/* libellé (un seul mot, visible au survol uniquement) */
.node-label{
  position: absolute; top: calc(100% + 10px); left: 50%;
  transform: translateX(-50%);
  font-size: 10px; font-weight: 500; letter-spacing: .18em; text-transform: uppercase;
  color: var(--accent); white-space: nowrap;
  opacity: 0; transition: opacity .25s ease;
  pointer-events: none;
}
.node:hover .node-label, .node:focus-visible .node-label{ opacity: 1; }

/* ---------- Toast ---------- */
.toast{
  position: fixed; left: 50%; bottom: calc(28px + env(safe-area-inset-bottom)); z-index: 30;
  transform: translate(-50%, 70px); opacity: 0;
  display: flex; align-items: center; gap: 9px;
  padding: 12px 20px; border-radius: 999px;
  background: rgba(0,0,0,.7); border: 1px solid var(--accent-line);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  font-size: 13px; letter-spacing: .03em;
  transition: transform .4s cubic-bezier(.34,1.56,.64,1), opacity .3s ease;
  pointer-events: none;
}
.toast.show{ transform: translate(-50%, 0); opacity: 1; }
.toast svg{ width: 15px; height: 15px; stroke: var(--accent); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

/* ---------- Mobile : slider horizontal au lieu de l'orbite ---------- */
@media (max-width: 760px){
  .stage{ display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .orbit{
    position: static; width: 100%; max-width: 100vw; height: auto;
    display: flex; flex-direction: column; align-items: center; gap: 42px;
  }
  .ring{ display: none; }

  .core{ position: relative; inset: auto; transform: none; padding: 0; }
  .core-name{ font-size: clamp(40px, 13vw, 60px); }

  .track{
    display: flex; gap: 14px; width: 100%;
    overflow-x: auto; scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    padding: 6px 11%;
    scrollbar-width: none;
  }
  .track::-webkit-scrollbar{ display: none; }

  .node{
    position: static; margin: 0;
    transform: none !important; opacity: 1 !important;
    flex: 0 0 78%; width: 78%; height: 88px;
    display: flex; flex-direction: row; align-items: center; justify-content: flex-start;
    gap: 16px; padding: 0 22px; border-radius: 22px;
    scroll-snap-align: center;
    background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.16);
  }
  .node svg{ width: 28px; height: 28px; }
  .node-label{
    position: static; transform: none; opacity: 1;
    font-size: 15px; letter-spacing: .04em; text-transform: none; color: var(--text);
  }
  .node:active{ background: var(--accent); border-color: var(--accent); color: var(--on-accent); }
  .node:active .node-label{ color: var(--on-accent); }

  .dots{ display: flex; gap: 4px; }
  .dot{
    width: 7px; height: 7px; padding: 6px; box-sizing: content-box;
    background: rgba(255,255,255,.28); background-clip: content-box;
    border: 0; border-radius: 50%; cursor: pointer;
    transition: background .25s ease;
  }
  .dot.active{ background: var(--accent); }
}

/* ---------- Mouvement réduit ---------- */
@media (prefers-reduced-motion: reduce){
  .core .ping{ animation: none; display: none; }
  *{ transition-duration: .01ms !important; }
}
</style>
</head>
<body>

<h1 class="sr-only">Skavyoy</h1>

<canvas id="shader" aria-hidden="true"></canvas>
<div class="vignette" aria-hidden="true"></div>

<div class="stage">
  <nav class="orbit" id="orbit" aria-label="Mes liens">

    <!-- Noyau : le pseudo (clic = copier le lien) -->
    <button class="core" id="core" aria-label="Skavyoy — copier le lien de la page">
      <span class="ping" aria-hidden="true"></span>
      <span class="ping" aria-hidden="true"></span>
      <span class="core-name">Skavyoy</span>
    </button>

    <!-- Nœuds : liens réels (marchent sans JS). Orbite sur desktop, slider sur mobile. -->
    <div class="track" id="track">
    <a class="node" data-i="0" href="https://github.com/Skavyoy8" target="_blank" rel="noopener" aria-label="GitHub">

<div class="toast" id="toast" role="status" aria-live="polite">
  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.5 12.5l5 5 10-11"/></svg>
  <span>Lien copié</span>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from "three";

const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
const isMobile = matchMedia("(max-width: 760px)").matches;

/* hex → vec3 (0–1) pour passer l'accent au shader */
const hexToRgb = hex => {
  const n = parseInt(hex.replace("#",""), 16);
  return [((n>>16)&255)/255, ((n>>8)&255)/255, (n&255)/255];
};
const accent = hexToRgb(getComputedStyle(document.documentElement).getPropertyValue("--accent").trim() || "#22d3ee");

/* ============================================================
   FOND — shader "lines" (repris de la ressource, Three.js)
   Tinté en monochrome sur l'accent + atténué pour rester sombre.
   ============================================================ */
const canvas = document.getElementById("shader");
let shader = null;
try {
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, powerPreference: "low-power" });
  renderer.setPixelRatio(Math.min(devicePixelRatio || 1, isMobile ? 1.5 : 2));

  const camera = new THREE.Camera();
  camera.position.z = 1;
  const scene = new THREE.Scene();
  const geometry = new THREE.PlaneGeometry(2, 2);

  const uniforms = {
    time:       { value: 1.0 },
    resolution: { value: new THREE.Vector2() },
    accent:     { value: new THREE.Vector3(...accent) },
    intensity:  { value: isMobile ? 0.20 : 0.26 }
  };

  const vertexShader = `
    void main(){ gl_Position = vec4(position, 1.0); }
  `;
  // Fragment : structure d'origine, sortie passée en monochrome teinté.
  const fragmentShader = `
    #define TWO_PI 6.2831853072
    precision highp float;
    uniform vec2 resolution;
    uniform float time;
    uniform vec3 accent;
    uniform float intensity;

    float random(in float x){ return fract(sin(x)*1e4); }

    void main(void){
      vec2 uv = (gl_FragCoord.xy * 2.0 - resolution.xy) / min(resolution.x, resolution.y);

      vec2 fMosaicScal = vec2(4.0, 2.0);
      vec2 vScreenSize = vec2(256.0, 256.0);
      uv.x = floor(uv.x * vScreenSize.x / fMosaicScal.x) / (vScreenSize.x / fMosaicScal.x);
      uv.y = floor(uv.y * vScreenSize.y / fMosaicScal.y) / (vScreenSize.y / fMosaicScal.y);

      float t = time * 0.06 + random(uv.x) * 0.4;
      float lineWidth = 0.0008;

      float v = 0.0;
      for(int j = 0; j < 3; j++){
        for(int i = 0; i < 5; i++){
          v += lineWidth * float(i*i) / abs(fract(t - 0.01*float(j) + float(i)*0.01) - length(uv));
        }
      }

      vec3 color = accent * v * intensity;
      gl_FragColor = vec4(color, 1.0);
    }
  `;

  const material = new THREE.ShaderMaterial({ uniforms, vertexShader, fragmentShader });
  scene.add(new THREE.Mesh(geometry, material));

  const resize = () => {
    renderer.setSize(innerWidth, innerHeight, false);
    canvas.style.width = innerWidth + "px";
    canvas.style.height = innerHeight + "px";
    uniforms.resolution.value.set(canvas.width, canvas.height);
  };
  resize();
  addEventListener("resize", resize, { passive: true });

  shader = {
    render(dt){ uniforms.time.value += dt * 1.0; renderer.render(scene, camera); }
  };
  if (reduce) shader.render(0.05); // image fixe
} catch (e) { canvas.remove(); }

/* ============================================================
   ORBITE — mécanique reprise du "radial orbital timeline"
   Auto-rotation, profondeur (z/opacité/échelle via cos/sin), focus.
   ============================================================ */
const nodes = [...document.querySelectorAll(".node")];
const total = nodes.length;

/* boucle shader seule (utilisée quand l'orbite ne tourne pas : mobile, ou reduced-motion) */
const runShaderOnly = () => {
  if (!shader || reduce) return;
  let last = performance.now();
  const loop = now => {
    const dt = Math.min((now - last) / 1000, 0.05); last = now;
    shader.render(dt);
    requestAnimationFrame(loop);
  };
  requestAnimationFrame(loop);
};

if (isMobile) {
  /* ============================================================
     MOBILE — slider horizontal (scroll-snap) + points indicateurs
     ============================================================ */
  const track = document.getElementById("track");
  const dotsWrap = document.getElementById("dots");

  nodes.forEach((n, i) => {
    const b = document.createElement("button");
    b.className = "dot";
    b.tabIndex = -1; // convenience tactile ; les liens restent le vrai chemin clavier
    b.setAttribute("aria-label", "Voir " + (n.getAttribute("aria-label") || ("lien " + (i + 1))));
    b.addEventListener("click", () => n.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" }));
    dotsWrap.appendChild(b);
  });
  const dots = [...dotsWrap.children];

  let raf = 0;
  const syncDots = () => {
    const max = track.scrollWidth - track.clientWidth;
    const i = max > 0 ? Math.round((track.scrollLeft / max) * (total - 1)) : 0;
    dots.forEach((d, k) => d.classList.toggle("active", k === i));
  };
  track.addEventListener("scroll", () => { cancelAnimationFrame(raf); raf = requestAnimationFrame(syncDots); }, { passive: true });
  syncDots();

  runShaderOnly();

} else {
  /* ============================================================
     DESKTOP — orbite (mécanique du radial orbital timeline)
     ============================================================ */
  const ring = document.getElementById("ring");
  let R = 220, angle = 0, auto = true;
  const ROT = 14; // degrés / seconde

  const setRadius = () => {
    R = Math.max(120, Math.min(240, Math.min(innerWidth, innerHeight) * 0.30));
    ring.style.width = ring.style.height = (R * 2) + "px";
  };
  setRadius();
  addEventListener("resize", setRadius, { passive: true });

  const place = () => {
    for (let i = 0; i < total; i++) {
      const a = ((i / total) * 360 + angle) % 360;
      const rad = a * Math.PI / 180;
      const x = Math.cos(rad) * R;
      const y = Math.sin(rad) * R;
      const depth = (1 + Math.sin(rad)) / 2;          // 0 (arrière) → 1 (avant)
      const scale = 0.82 + depth * 0.26;
      const n = nodes[i];
      n.style.transform = `translate(${x.toFixed(1)}px, ${y.toFixed(1)}px) scale(${scale.toFixed(3)})`;
      n.style.zIndex = String(Math.round(100 + 50 * Math.cos(rad)));
      n.style.opacity = (0.45 + depth * 0.55).toFixed(3);
    }
  };

  /* pause de la rotation au survol / focus d'un nœud */
  nodes.forEach(n => {
    const stop = () => auto = false;
    const go = () => auto = true;
    n.addEventListener("pointerenter", stop);
    n.addEventListener("pointerleave", go);
    n.addEventListener("focus", stop);
    n.addEventListener("blur", go);
  });

  /* repositionne au redimensionnement (utile en reduced-motion : la boucle ne tourne pas) */
  addEventListener("resize", () => requestAnimationFrame(place), { passive: true });

  let last = performance.now();
  const loop = now => {
    const dt = Math.min((now - last) / 1000, 0.05); last = now;
    if (auto && !reduce) angle = (angle + dt * ROT) % 360;
    place();
    if (shader && !reduce) shader.render(dt);
    requestAnimationFrame(loop);
  };
  if (reduce) { place(); runShaderOnly(); } else { requestAnimationFrame(loop); }
}

/* ============================================================
   Noyau — clic = copier le lien (le pseudo EST le bouton)
   ============================================================ */
const toast = document.getElementById("toast");
let tt;
const showToast = () => {
  toast.classList.add("show");
  clearTimeout(tt);
  tt = setTimeout(() => toast.classList.remove("show"), 2400);
};
const copyFallback = url => {
  const ta = document.createElement("textarea");
  ta.value = url; ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  let ok = false; try { ok = document.execCommand("copy"); } catch {}
  ta.remove(); return ok;
};
document.getElementById("core").addEventListener("click", async () => {
  const url = location.href;
  if (navigator.share && isMobile) { try { await navigator.share({ title: "Skavyoy", url }); return; } catch {} }
  try { await navigator.clipboard.writeText(url); showToast(); return; } catch {}
  if (copyFallback(url)) showToast();
});
</script>
</body>
